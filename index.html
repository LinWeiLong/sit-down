<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小坐姿陪伴</title>
    <link rel="stylesheet" href="./src/styles/app.css?v=20260714-demo-refactor">
</head>

<body>
    <main id="app" class="app-shell landing-shell">
        <section class="view home-view landing-view landing-only">
            <div class="topline">本地识别 · 不录像 · 不上传</div>
            <h1>孩子写字看书时，轻轻提醒坐姿。</h1>
            <p class="intro">小坐姿陪伴面向家长，用手机、平板或旧手机在书桌前方观察孩子写字、阅读时的低头趋势，并用温和语音提醒孩子调整。</p>
            <div class="landing-card">
                <div><strong>低头提醒优先</strong><span>恢复接近原始 Demo 的低头检测手感，重点解决写字看书时头越埋越低的问题。</span></div>
                <div><strong>书桌上半身模式</strong><span>Demo 只要求头部和双肩清楚入镜，更贴近孩子做作业的真实场景。</span></div>
                <div><strong>隐私友好</strong><span>摄像头画面只在本机浏览器内临时识别，不上传、不录像。</span></div>
            </div>
            <a class="primary-action landing-action" href="./demo.html">立即体验 Demo</a>
            <div class="privacy-note">完整专注模式、长期记录和更细的家长设置会放在 Android APP 中；公开页面只保留介绍和简单体验。</div>
        </section>
    </main>
</body>

</html>
