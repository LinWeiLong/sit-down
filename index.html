<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小坐姿陪伴</title>
    <script src="./vendor/mediapipe/pose/pose.js"></script>
    <script src="./vendor/mediapipe/camera_utils/camera_utils.js"></script>
    <script src="./vendor/mediapipe/drawing_utils/drawing_utils.js"></script>
    <link rel="stylesheet" href="./src/styles/app.css">
</head>

<body>
    <main id="app" class="app-shell">
        <section id="homeView" class="view home-view">
            <div class="topline">本地运行 · 不录像 · 不上传</div>
            <h1>小坐姿陪伴</h1>
            <p class="intro">给孩子写字、看书时用的坐姿提醒。家长先选本轮学习内容，摆好手机，校准后屏幕会变黑，只用语音轻轻提醒。</p>

            <form id="sessionForm" class="session-form">
                <label class="field-label" for="activitySelect">本轮做什么</label>
                <select id="activitySelect">
                    <option value="writing">写字作业</option>
                    <option value="reading">阅读</option>
                    <option value="drawing">绘画/手工</option>
                    <option value="other">其他</option>
                </select>

                <div class="field-label">学习周期</div>
                <div class="duration-grid" role="group" aria-label="学习周期快捷选项">
                    <button type="button" class="duration-option" data-minutes="10">10分钟</button>
                    <button type="button" class="duration-option active" data-minutes="15">15分钟</button>
                    <button type="button" class="duration-option" data-minutes="20">20分钟</button>
                </div>
                <label class="custom-duration">
                    自定义
                    <input id="durationInput" type="number" min="5" max="45" step="1" value="15">
                    分钟
                </label>

                <button id="prepareBtn" class="primary-action" type="submit">开始摆放设备</button>
            </form>

            <div class="privacy-note">摄像头画面和姿态关键点只在本机临时处理；历史记录只保存会话汇总。</div>
        </section>

        <section id="studyView" class="view study-view hidden">
            <video id="video" playsinline></video>
            <canvas id="canvas" width="640" height="480"></canvas>
            <div id="status" class="status-card">正在准备...</div>
            <div id="studyControls" class="study-controls">
                <button id="calibBtn" type="button">开始校准</button>
                <button id="endBtn" type="button" class="secondary-action">结束本轮</button>
            </div>
        </section>

        <section id="resultView" class="view result-view hidden">
            <h2>本轮结束</h2>
            <div id="resultSummary" class="result-summary"></div>
            <button id="backHomeBtn" class="primary-action" type="button">回到首页</button>
        </section>
    </main>

    <script src="./src/js/posture-math.js"></script>
    <script src="./src/js/session-model.js"></script>
    <script src="./src/js/app.js"></script>
</body>

</html>
